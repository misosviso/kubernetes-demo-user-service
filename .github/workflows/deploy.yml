name: Build and Deploy to AWS EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      - name: Build Docker image
        run: |
          docker build -t user-service:${{ github.sha }} .


      - name: Tag Docker image
        run: |
          docker tag user-service:${{ github.sha }} \
          ${{ secrets.ECR_REGISTRY }}/user-service:${{ github.sha }}


      - name: Push Docker image to ECR
        run: |
          docker push \
          ${{ secrets.ECR_REGISTRY }}/user-service:${{ github.sha }}


      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name ${{ secrets.EKS_CLUSTER_NAME }}


      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/user-service \
          user-service=${{ secrets.ECR_REGISTRY }}/user-service:${{ github.sha }}
          
      - name: Restart user-service deployment
        run: kubectl rollout restart deployment user-service